trigger:
  - main

pool:
  name: Default   # self-hosted agent

variables:
  azureSubscription: 'cost-connection'
  functionAppName: 'apptestdeploy'

steps:
  # ❌ DO NOT install Python dependencies in pipeline
  # ❌ DO NOT use UsePythonVersion
  # Azure Function runtime will handle dependencies via Oryx

  - task: ArchiveFiles@2
    displayName: 'Archive Function App'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
      includeRootFolder: false
      archiveType: zip
      archiveFile: '$(Build.ArtifactStagingDirectory)/functionapp.zip'
      replaceExistingArchive: true

  - task: AzureFunctionApp@2
    displayName: 'Deploy to Azure Function App'
    inputs:
      azureSubscription: '$(azureSubscription)'
      appType: functionAppLinux
      appName: '$(functionAppName)'
      package: '$(Build.ArtifactStagingDirectory)/functionapp.zip'
      scmDoBuildDuringDeployment: true
      enableOryxBuild: true
